# Flash Intelligence Core — Configuration
# All weights, thresholds, and tunable parameters are here.
# No hardcoded magic numbers in source code.

database:
  path: "./data/flash_intel.db"

server:
  host: "0.0.0.0"
  port: 8000

# ── SSD Failure Prediction ────────────────────────────────────────
failure_prediction:
  # Minimum history records required before fitting models
  min_history_records: 5
  # IsolationForest contamination factor (fraction of anomalies expected)
  contamination: 0.05
  # Maximum projected remaining life shown in days
  max_life_days: 1825 # ~5 years

# ── Ransomware Detection ─────────────────────────────────────────
ransomware:
  # Minimum history records required for baseline
  min_history_records: 3
  # Number of standard deviations above mean to flag writeIOPS anomaly
  write_iops_std_multiplier: 3.0
  # Rename count considered a spike per payload
  rename_spike_threshold: 20
  # Burst write rate considered high (MB/s equivalent)
  burst_write_high_threshold: 5000.0
  # Weights summing to 1.0 for component scores
  weights:
    iops_weight: 0.5
    rename_weight: 0.3
    burst_weight: 0.2

# ── Storage Layout Optimization ───────────────────────────────────
storage_optimizer:
  n_clusters: 3
  # Hotness formula weights (must sum to ~1.0)
  weights:
    frequency: 0.4
    recency: 0.3
    write_intensity: 0.2
    size: 0.1
  # Label ordering from hottest to coldest cluster by mean hotness
  cluster_labels: ["HOT", "WARM", "COLD"]

# ── Storage Growth Forecast ───────────────────────────────────────
growth_forecast:
  # Percentage of capacity considered "full"
  full_threshold_pct: 90.0
  min_history_records: 3

# ── Compression Estimator ─────────────────────────────────────────
compression:
  enabled: true
  # Max bytes to sample per file for entropy calculation
  sample_size: 65536 # 64 KB
  # Entropy → estimated compression ratio mapping
  # entropy range [0,8] → ratio range [very high, no compression]
  entropy_ratio_map:
    # entropy_max: compression_ratio
    1.0: 8.0
    2.0: 4.0
    4.0: 2.0
    6.0: 1.3
    8.0: 1.0

# ── Archival Recommendation ───────────────────────────────────────
archival:
  # Recency threshold in days (files not accessed for this long are eligible)
  recency_threshold_days: 90
  # Minimum file size in bytes to consider for archival
  min_size_bytes: 1048576 # 1 MB
  # Maximum number of candidates to return
  max_candidates: 20
  # Performance penalty weight in archive_score = size_norm - penalty
  performance_penalty_weight: 0.1

# ── Simulation Engine ─────────────────────────────────────────────
simulation:
  # Assumed compression ratio for projected capacity after archive
  archive_compression_ratio: 2.5
  # Write intensity reduction factor from archiving COLD files
  wear_reduction_factor: 0.35
  # SSD lifespan extension per unit wear reduction (in days)
  lifespan_days_per_wear_reduction_unit: 90
